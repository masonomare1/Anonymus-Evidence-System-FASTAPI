<!doctype html><html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Objection — Verify Evidence</title>
<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/style.css">
<style>.display{font-family:"Playfair Display",Georgia,serif}</style>
</head>
<body class="antialiased" x-data="verifier()">
  <nav class="max-w-6xl mx-auto flex items-center justify-between px-6 py-5">
    <a href="/" class="display text-2xl font-extrabold">OBJECTION</a>
    <span class="text-sm" style="color:var(--muted)">Evidence Verification</span>
  </nav>

  <main class="max-w-3xl mx-auto px-6 py-8">
    <!-- INTAKE -->
    <section x-show="state==='idle'">
      <h1 class="display text-4xl font-bold mb-2">Submit evidence package</h1>
      <p style="color:var(--muted)" class="mb-6">Drop files (or add them individually). Nothing is stored; raw content never leaves the verification step.</p>

      <div @dragover.prevent="drag=true" @dragleave.prevent="drag=false" @drop.prevent="onDrop($event)"
           :class="drag?'ring-2':''" class="rounded-2xl p-10 text-center cursor-pointer"
           style="background:#fff;border:2px dashed var(--line)" @click="$refs.file.click()">
        <p class="font-medium">Drag & drop evidence files here</p>
        <p class="text-sm mt-1" style="color:var(--muted)">or click to choose — supported: .txt, .mp3</p>
        <input x-ref="file" type="file" multiple accept=".txt,.md,.csv,.log,.json,.mp3,text/*,audio/*" class="hidden" @change="onPick($event)">
      </div>

      <p x-show="notice" x-text="notice" class="mt-3 text-sm rounded-lg p-3" style="color:var(--burgundy);background:#fff;border:1px solid var(--burgundy)"></p>

      <div class="flex items-center gap-3 my-4">
        <button @click="loadDemo()" class="px-4 py-2 rounded-lg text-white" style="background:var(--ink)">Load demo package</button>
        <span class="text-sm" style="color:var(--muted)" x-text="items.length+' file(s) ready'"></span>
      </div>

      <ul class="space-y-2 mb-6">
        <template x-for="(it,i) in items" :key="i">
          <li class="flex items-center justify-between rounded-lg px-4 py-2" style="background:#fff;border:1px solid var(--line)">
            <span x-text="(it.name||it.label)+'  ·  '+it.type" class="text-sm"></span>
            <button @click="items.splice(i,1)" class="text-sm accent">remove</button>
          </li>
        </template>
      </ul>

      <button @click="run()" :disabled="!items.length"
        class="px-7 py-3 rounded-xl text-white text-lg disabled:opacity-40" style="background:var(--burgundy)">
        Run verification →
      </button>
    </section>

    <!-- PIPELINE (intake → analyzing → scoring) -->
    <section x-show="['intake','analyzing','scoring'].includes(state)" id="pipeline"></section>

    <!-- RESULT -->
    <section x-show="state==='done'"><div id="certificate"></div>
      <button @click="reset()" class="mt-6 px-5 py-2 rounded-lg" style="border:1px solid var(--line)">Verify another package</button>
    </section>

    <!-- ERROR -->
    <section x-show="state==='error'" class="rounded-xl p-6" style="background:#fff;border:1px solid var(--burgundy)">
      <p class="accent font-medium">Something went wrong.</p>
      <p class="text-sm mt-1" style="color:var(--muted)" x-text="errorMsg"></p>
      <button @click="reset()" class="mt-4 px-5 py-2 rounded-lg text-white" style="background:var(--burgundy)">Try again</button>
    </section>
  </main>

  <div class="toast" id="toast"></div>
  <script src="/assets/ui.js"></script>
  <script src="/assets/app.js"></script>
</body></html>
